<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="admin.css">
    <script src="/nihongo/config.js"></script>
     <script src="/nihongo/auth-v2.js" defer></script>
</head>
<body>
    <header>
        <h1>Admin Panel</h1>
    </header>
    
    <main>
        <section id="tabs">
        	   <button class="tab-button active" data-tab="settings">Settings</button>
            <button class="tab-button" data-tab="users">Users</button>
            <button class="tab-button" data-tab="send-notifications">Send Notifications</button>
            <button class="tab-button" data-tab="view-notifications">View Notifications</button>
            <button class="tab-button" data-tab="subscriptions">Subscriptions</button>
            <button class="tab-button" data-tab="view-logs">View Logs</button>
        </section>
        
        
<!-- Site Settings Tab -->
<section id="site-settings" class="tab-content active">
    <h2>Site Settings</h2>
    <form id="site-settings-form">
        <label for="siteStatus">Site Status</label>
        <select id="siteStatus" name="siteStatus">
            <option value="active">Active</option>
            <option value="disabled">Disabled</option>
            <option value="blocked">Blocked</option>
        </select>
        
        <label for="disableLogin">Disable Login</label>
        <input type="checkbox" id="disableLogin" name="disableLogin">

        <label for="disableSignup">Disable Signup</label>
        <input type="checkbox" id="disableSignup" name="disableSignup">

        <button type="submit">Update Settings</button>
    </form>
</section>


        <!-- Manage Users Tab -->
        <section id="users" class="tab-content">
            <h2>Manage Users</h2>
            <table>
                <thead>
                    <tr>
      				  <th>UserId</th>                  
						<th>Username</th>
                        <th>IP Address</th>
                        <th>Role</th>
                        <th>IsOnline</th>
                        <th>Last Active</th>
                        <th>IsSuspended</th>                                     
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <!-- Users will load here -->
                </tbody>
            </table>
        </section>

        <!-- Send Notifications Tab -->
        <section id="send-notifications" class="tab-content">
            <h2>Send Notification</h2>
            <form id="notification-form">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required>
                
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
                
                <label for="icon">Icon URL (optional)</label>
                <input type="url" id="icon" name="icon">
                
                <label for="image">Image URL (optional)</label>
                <input type="url" id="image" name="image">
                
				<label for="username">Send to (optional)</label>
				<select id="username" name="username">
				    <option value="">Leave blank for all users</option>
				</select>
                
                <button type="submit">Send Notification</button>
            </form>
        </section>

<!-- View Notifications Tab -->
<section id="view-notifications" class="tab-content">
    <h2>View All Notifications</h2>
    <div id="notification-list" class="notification-container">
        <!-- Notifications will be dynamically added here -->
    </div>
</section>

        <!-- Subscriptions Tab -->
        <section id="subscriptions" class="tab-content">
            <h2>Monitor Subscriptions</h2>
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th >Endpoint</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="subscription-list">
                    <!-- Subscriptions will load here -->
                </tbody>
            </table>
        </section>
     
		
		<!-- New section to display logs -->
		<section id="view-logs" class="tab-content">
		    <h2>View Activity Logs</h2>
		    <table>
		        <thead>
		            <tr>
		                <th>User ID</th>
		                <th>Username</th>
		                <th>Action</th>
		                <th>Details</th>
		                <th>IP Address</th>
		                <th>Timestamp</th>
		            </tr>
		        </thead>
		        <tbody id="log-list">
		            <!-- Logs will load here -->
		        </tbody>
		    </table>
		</section>

   </main>
    
     <!-- Console area to display logs -->
    <div id="console"></div>

        
    <script src="admin.js"></script>
</body>
</html>
