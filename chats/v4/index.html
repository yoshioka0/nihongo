<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="chat.css">
  <script src="/nihongo/auth-v2.js"></script>
     <script src="/nihongo/config.js"></script>
    <title>Nihongo Chats</title>
</head>
<body>
		 <!-- Noscript message: if JavaScript is disabled, redirect user -->
  <noscript>
    <meta http-equiv="refresh" content="0;url=/nihongo/js-disabled.html" />
  </noscript>
	
	
    <div class="chat-container">
        <!-- Left Panel: User List -->
        <div class="left-panel">
            <div class="header">
                <h2><a href="/nihongo/" style="color:white; text-decoration: none;">Nihongo Chats</a></h2>
                <div class="profile">
                <img class="avatar" src="/nihongo/img/user.png" alt="Profile">
                <p id="myUsername" class="username">Your Username</p> <!-- Dynamically populate this in chat.js -->
            </div>
                <input id="search-users" type="text" placeholder="Search users..." oninput="searchUsers()" />
            </div>
            <div id="chat-list" class="chat-list">
                <!-- User items will be dynamically loaded here -->
            </div>
            <button id="logoutBtn" class="logout-button" onclick=logout() >Logout</button>
        </div>

        <!-- Right Panel: Chat Window -->
        <div class="right-panel">
	      <div class="chat-header">
                <h3 id="chat-user" class="chat-user" >Select a user to chat</h3>
                <div class="block-box"> 
                	<button id="startConnectionButton" class="button3">🛜</button>
					<button id="block-button" class="block-button" style="display: none;">Block</button> 
				</div>
             </div>
             
 <div id="connectionStatus">Connection Status: Waiting...</div>
<div id="fileStatus">File Status: Waiting for Connection!</div>
<div id="fileProgressContainer" style="width: 100%; background: #ccc; height: 20px;">
 	<div id="fileProgress" style="width: 0%; height: 100%; background: #4caf50;"></div>
</div>


            <div id="chat-window" class="chat-window">

                <div id="messages" class="messages">
                    <!-- Messages will be dynamically loaded here -->
                </div>
   
            </div>
						
				<div id="typing-indicator" class="typing-indicator" style="display: none;">
    				<span id="typing-text">User is typing...</span>
     			</div>
			
            <div class="message-input-area">
            	<input type="file" id="imageInput" accept="image/*" style="display: none;" />
				<button id="attachImage">🗃️</button>
                <input id="message-input" type="text" placeholder="Type a message..." />
                <button id="send-button">Send</button>
            </div>
        </div>
    </div>
    
    <script>
    // Dynamically set the viewport height for better compatibility
    function setViewportHeight() {
      document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    }

    window.addEventListener('resize', setViewportHeight);
    setViewportHeight();
  </script>
 
    
    <script src="https://cdn.socket.io/4.5.1/socket.io.min.js"></script>
    <script src="chat.js"></script>
    <script src="webrtc.js"></script>
    
</body>
</html>
